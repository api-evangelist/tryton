aid: tryton
name: Tryton
description: >-
  Tryton is an open-source three-tier ERP (Enterprise Resource Planning) platform
  built on Python and PostgreSQL, designed for companies of any size. It provides
  REST APIs for managing a comprehensive suite of business modules including
  financial accounting, inventory and stock management, purchasing, sales, production,
  and project management. The REST API supports standard CRUD operations (GET, POST,
  PUT, DELETE) with JSON responses, user application authentication, context headers
  for localization, pagination via Range headers, and domain filtering via query
  parameters. Tryton is licensed under GPL v3 and free to use.
